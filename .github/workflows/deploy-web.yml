name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  export:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      - name: Cache Godot export templates
        id: cache_templates
        uses: actions/cache@v6
        with:
          path: ~/.local/share/godot/export_templates/4.7.stable
          key: godot-templates-4.7-stable
          restore-keys: |
            godot-templates-

      - name: Download Godot 4.7 (headless)
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
          wget -q https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_export_templates.tpz
          unzip -q Godot_v4.7-stable_linux.x86_64.zip
          mv Godot_v4.7-stable_linux.x86_64 godot
          chmod +x godot

      - name: Install Godot export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.7.stable
          unzip -q Godot_v4.7-stable_export_templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/4.7.stable/
          ls ~/.local/share/godot/export_templates/4.7.stable/ | head -5

      - name: Import project (cache resources)
        run: |
          ./godot --headless --import || true

      - name: Export Web release
        run: |
          mkdir -p build/web
          ./godot --headless --export-release "Web" build/web/index.html

      - name: Verify web export
        run: |
          ls -la build/web/
          test -f build/web/index.html
          test -f build/web/index.js
          test -f build/web/index.wasm

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/web

  deploy:
    needs: export
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
